<!DOCTYPE html>
<html lang="da">
  <head>

    <title>Siden blev ikke fundet | Work4it</title>

    <style media="screen">
      body { background: #1e252b; color: #fff; font-family: "Segoe UI", Arial, sans-serif; margin: 0; padding: 24px; }
      #message { background: #252e36; border: 1px solid #313d49; max-width: 420px; margin: 100px auto 16px; padding: 32px 24px; border-radius: 8px; }
      #message h2 { color: #4ade80; font-weight: 700; font-size: 14px; margin: 0 0 8px; }
      #message h1 { font-size: 24px; font-weight: 700; margin: 0 0 16px; }
      #message p { color: #a0aab2; line-height: 1.5; margin: 16px 0 24px; font-size: 14px; }
      #message a { display: block; text-align: center; background: #3a93ff; font-weight: 600; text-decoration: none; color: white; padding: 13px 16px; border-radius: 6px; }
      @media (max-width: 600px) {
        body { padding: 16px; }
        #message { margin-top: 48px; }
      }
    </style>
  </head>
  <body>
    <div id="message">
      <h2>404</h2>
      <h1>Siden blev ikke fundet</h1>
